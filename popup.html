<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiverr Extractor</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        width: 320px;
        padding: 16px;
        background: #fff;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #e5e7eb;
      }
      .icon {
        width: 36px;
        height: 36px;
        background: #16a34a;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        color: #111827;
      }
      .subtitle {
        font-size: 12px;
        color: #6b7280;
      }
      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 8px;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #16a34a;
        color: white;
      }
      .btn-primary:hover {
        background: #15803d;
      }
      .btn-secondary {
        background: #f3f4f6;
        color: #374151;
        border: 1px solid #e5e7eb;
      }
      .btn-secondary:hover {
        background: #e5e7eb;
      }
      .features {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #e5e7eb;
      }
      .features h3 {
        font-size: 12px;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }
      .feature-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .feature {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #374151;
      }
      .feature-dot {
        width: 6px;
        height: 6px;
        background: #16a34a;
        border-radius: 50%;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="icon">⚡</div>
      <div>
        <h1>Fiverr Extractor</h1>
        <div class="subtitle">Extract conversations easily</div>
      </div>
    </div>

    <button class="btn btn-primary" id="openSidePanel">
      📌 Open Side Panel
    </button>

    <button class="btn btn-secondary" id="openFullPage">
      🌐 Open Full Page
    </button>

    <div class="features">
      <h3>Features</h3>
      <div class="feature-list">
        <div class="feature"><div class="feature-dot"></div>Extract all conversations</div>
        <div class="feature"><div class="feature-dot"></div>Download as Markdown/JSON</div>
        <div class="feature"><div class="feature-dot"></div>Bulk export contacts</div>
        <div class="feature"><div class="feature-dot"></div>Message search & stats</div>
      </div>
    </div>

    <script src="popup-handler.js"></script>
  </body>
</html>
